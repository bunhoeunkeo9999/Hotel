apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-service
  labels:
    app: room-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: room-service
  template:
    metadata:
      labels:
        app: room-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: room-service
          image: hotel-room:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: room-service
spec:
  type: NodePort
  selector:
    app: room-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 31080
---
